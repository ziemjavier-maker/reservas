<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas de Salas de Video</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
font-size:18px;
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

header h2{
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

input,select,button{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#007bff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.ok{
color:green;
font-weight:bold;
}

.ocupado{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h2>📅 Reservas de Salas de Video</h2>
</header>

<div class="container">

<div class="card">

<h3>Reservar Sala</h3>

<input type="text" id="docente" placeholder="Nombre del docente">

<input type="date" id="fecha">

<select id="sala">

<option value="Sala 1">Sala de Video 1</option>
<option value="Sala 2">Sala de Video 2</option>

</select>

<select id="horario"></select>

<button onclick="reservar()">Guardar Reserva</button>

<div id="reservaInfo"></div>

</div>


<div class="card">

<h3>Disponibilidad</h3>

<input type="date" id="fechaConsulta">

<select id="salaConsulta">

<option value="Sala 1">Sala de Video 1</option>
<option value="Sala 2">Sala de Video 2</option>

</select>

<button onclick="mostrarDisponibilidad()">Ver Ocupación</button>

<div id="consultaInfo"></div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCM3EhC_h9edEUCqnFgv-3Leh-Dk3ybj0E",
authDomain: "salas-de-video.firebaseapp.com",
projectId: "salas-de-video",
storageBucket: "salas-de-video.firebasestorage.app",
messagingSenderId: "927749215007",
appId: "1:927749215007:web:f7f7c13d932cb1ca23162a"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



const horarios=[

"07:15","07:55","08:35","08:45","09:25","10:05",
"10:20","10:55","11:35","11:40","12:20","13:00",
"13:15","13:55","14:35","14:45","16:05","16:15",
"17:35","17:40","19:00","19:30","20:05","20:40",
"20:50","21:25","22:00","22:05","22:40","23:15"

];



function cargarHorarios(){

const select=document.getElementById("horario");

select.innerHTML="";

horarios.forEach(h=>{

const option=document.createElement("option");

option.value=h;

option.textContent=h;

select.appendChild(option);

});

}

cargarHorarios();




function esDiaValido(fecha){

const partes=fecha.split("-");

const fechaLocal=new Date(partes[0],partes[1]-1,partes[2]);

const dia=fechaLocal.getDay();

return dia>=1 && dia<=5;

}



async function reservar(){

const docente=document.getElementById("docente").value.trim();

const fecha=document.getElementById("fecha").value;

const sala=document.getElementById("sala").value;

const horario=document.getElementById("horario").value;

const info=document.getElementById("reservaInfo");

if(!docente || !fecha){

info.innerHTML="Complete todos los campos";

return;

}

if(!esDiaValido(fecha)){

info.innerHTML="⚠️ Solo se puede reservar de lunes a viernes";

return;

}

const id=`${fecha}_${sala}_${horario}`;

const ref=db.collection("reservas").doc(id);

const snap=await ref.get();

if(snap.exists){

info.innerHTML="<span class='ocupado'>Horario ocupado</span>";

return;

}

await ref.set({

docente:docente,

fecha:fecha,

sala:sala,

horario:horario,

creado:new Date().toLocaleString()

});

info.innerHTML="<span class='ok'>Reserva guardada</span>";

}



async function mostrarDisponibilidad(){

const fecha=document.getElementById("fechaConsulta").value;

const sala=document.getElementById("salaConsulta").value;

const info=document.getElementById("consultaInfo");

if(!fecha){

info.innerHTML="Seleccione una fecha";

return;

}

info.innerHTML="Cargando...";

const query=await db.collection("reservas")

.where("fecha","==",fecha)

.where("sala","==",sala)

.get();

const ocupados={};

query.forEach(doc=>{

const r=doc.data();

ocupados[r.horario]=r.docente;

});

let html=`<h4>${sala} - ${fecha}</h4>`;

horarios.forEach(h=>{

if(ocupados[h]){

html+=`<p class="ocupado">${h} - OCUPADO (${ocupados[h]})</p>`;

}else{

html+=`<p class="ok">${h} - LIBRE</p>`;

}

});

info.innerHTML=html;

}

</script>

</body>
</html>
